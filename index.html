<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mautic Contact Identity Controller</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f4f7f9; color: #333; }
        header { background: #002b49; color: white; padding: 25px; text-align: center; border-bottom: 4px solid #007cba; }
        .container { max-width: 600px; margin: 40px auto; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        .field-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #444; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #ccd1d9; border-radius: 6px; 
            box-sizing: border-box; font-size: 15px; background-color: #fff;
        }
        input:focus { border-color: #007cba; outline: none; box-shadow: 0 0 0 3px rgba(0,124,186,0.1); }

        .status-badge { 
            background: #e1f5fe; color: #01579b; padding: 10px; 
            border-radius: 6px; margin: 20px 0; font-size: 14px; text-align: center;
            border: 1px solid #b3e5fc;
        }

        button { 
            background-color: #007cba; color: white; border: none; padding: 16px; 
            font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%;
            transition: all 0.2s;
        }
        button:hover { background-color: #005a87; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        #console-log { 
            margin-top: 25px; background: #1c1c1c; color: #00e676; padding: 15px; 
            border-radius: 6px; font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; 
            height: 150px; overflow-y: auto; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<header>
    <h1>Mautic Manual Lead Sync</h1>
</header>

<div class="container">
    <div class="card">
        <div class="field-group">
            <label>Target Contact Email:</label>
            <input type="email" id="targetEmail" placeholder="Enter owner@restaurant.com" value="test_contact_1@example.com">
        </div>

        <div class="field-group">
            <label>Update Tags (comma separated):</label>
            <input type="text" id="targetTags" placeholder="e.g. hot_lead, pos_interested" value="article_reader, labor_cost_focus">
        </div>

        <div class="status-badge">
            Tracking Action: <strong>Article Read</strong><br>
            Content: <strong>Labor Cost Trends 2025</strong>
        </div>
        
        <button onclick="triggerMauticSync()">Sync to Mautic Profile</button>

        <div id="console-log">Ready to identify contact...</div>
    </div>
</div>

<script>
    // --- 1. Mautic Tracking Setup ---
    (function(w,d,t,u,n,a,m){
        w['MauticTrackingObject']=n;
        w[n]=w[n]||function(){(w[n].q=w[n].q||[]).push(arguments)},
        a=d.createElement(t),
        m=d.getElementsByTagName(t)[0];
        a.async=1; a.src=u; m.parentNode.insertBefore(a,m)
    })(window,document,'script','https://d2.restaurantassociation.com/mtc.js','mt');

    function writeLog(message) {
        const consoleBox = document.getElementById('console-log');
        consoleBox.innerHTML += `> ${new Date().toLocaleTimeString()}: ${message}<br>`;
        consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    // --- 2. The Identity Switching Logic ---
    function triggerMauticSync() {
        const email = document.getElementById('targetEmail').value;
        const tags = document.getElementById('targetTags').value;
        const article = "Labor Cost Trends 2025";

        if (!email) {
            alert("Please provide an email address.");
            return;
        }

        writeLog(`Switching context to: <strong>${email}</strong>`);

        // A. Formal Event (for internal reports)
        mt('send', 'event', {
            category: 'Content',
            action: 'Article Read',
            name: article,
            email: email // Identifying the contact here as well
        });

        // B. Force Rows in Timeline (using the URL trick)
        const currentPath = window.location.origin + window.location.pathname;
        const trackingUrl = `${currentPath}?article=${encodeURIComponent(article)}&category=Content&action=Article+Read&t=${Date.now()}`;

        // C. The CRITICAL Identity Hit
        // By sending 'email' here, Mautic matches the browser hit to the specific contact record.
        mt('send', 'pageview', {
            'mt_event': article,
            'page_title': article,
            'page_url': trackingUrl,
            'email': email, // Updates/Finds the specific contact
            'tags': tags    // Syncs the tags
        });

        writeLog(`✅ Success! Data pushed to ${email}.`);
    }

    // Confirmation from Mautic Server
    document.addEventListener('mauticPageEventDelivered', function() {
        writeLog('Mautic Server: Contact profile sync confirmed.');
    });
</script>

</body>
</html>
