<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manual CRM Sync | No Auto-Tracking</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8f9fa; padding: 40px; display: flex; justify-content: center; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #004a7c; font-size: 20px; margin-top: 0; }
        label { display: block; font-weight: 600; font-size: 13px; margin: 15px 0 5px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { 
            width: 100%; padding: 15px; background: #28a745; color: white; border: none; 
            border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 16px;
        }
        button:hover { background: #218838; }
        #status-console { 
            margin-top: 20px; background: #222; color: #00ff00; padding: 12px; 
            border-radius: 6px; font-family: monospace; font-size: 12px; height: 80px; overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Mautic Manual Sync</h2>
    
    <label>Contact Email (Required):</label>
    <input type="email" id="targetEmail" placeholder="Enter user@restaurant.com">
    
    <label>Tags to Apply:</label>
    <input type="text" id="targetTags" placeholder="e.g. hot_lead, pos_demo">
    
    <button onclick="manualSync()">Push Data to Mautic</button>
    
    <div id="status-console">Awaiting user action...</div>
</div>

<script>
    // --- 1. SILENT INITIALIZATION ---
    // The library loads, but notice there is NO mt('send', 'pageview') here.
    (function(w,d,t,u,n,a,m){
        w['MauticTrackingObject']=n;
        w[n]=w[n]||function(){(w[n].q=w[n].q||[]).push(arguments)},
        a=d.createElement(t),
        m=d.getElementsByTagName(t)[0];
        a.async=1; a.src=u; m.parentNode.insertBefore(a,m)
    })(window,document,'script','https://d2.restaurantassociation.com/mtc.js','mt');

    function log(msg) {
        const console = document.getElementById('status-console');
        console.innerHTML += `> ${msg}<br>`;
        console.scrollTop = console.scrollHeight;
    }

    // --- 2. CONTROLLED EXECUTION ---
    function manualSync() {
        const email = document.getElementById('targetEmail').value;
        const tags = document.getElementById('targetTags').value;

        if (!email) {
            alert("Email is required before sending data.");
            return;
        }

        log(`Initiating sync for ${email}...`);

        // Force reset the ID so it doesn't merge with previous browser sessions
        mt('set', 'id', null);

        // Define the specific event data
        const articleTitle = "Labor Cost Trends 2025";
        const forcedUrl = `${window.location.origin}${window.location.pathname}?article=${encodeURIComponent(articleTitle)}&category=Content&action=Read&t=${Date.now()}`;

        // NOW we send the data
        mt('send', 'pageview', {
            'mt_event': articleTitle,
            'page_title': articleTitle,
            'page_url': forcedUrl,
            'email': email,
            'tags': tags
        });

        log(`✅ Success: Event pushed.`);
    }

    // Confirmation from server
    document.addEventListener('mauticPageEventDelivered', function() {
        log('Mautic: Data received.');
    });
</script>

</body>
</html>
