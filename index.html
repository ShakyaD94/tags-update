<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mautic Multi-Contact Force Sync</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: #f4f7f9; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #log { margin-top: 20px; background: #222; color: #0f0; padding: 10px; font-size: 12px; height: 100px; overflow: auto; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h3>Force Sync by Email</h3>
    <label>Target Email:</label>
    <input type="email" id="targetEmail" value="user_A@example.com">
    
    <label>Tags:</label>
    <input type="text" id="targetTags" value="test_tag_1">
    
    <button onclick="forceNewContactSync()">Sync This Specific Email</button>
    
    <div id="log">Ready...</div>
</div>

<script>
    (function(w,d,t,u,n,a,m){
        w['MauticTrackingObject']=n;
        w[n]=w[n]||function(){(w[n].q=w[n].q||[]).push(arguments)},
        a=d.createElement(t),
        m=d.getElementsByTagName(t)[0];
        a.async=1; a.src=u; m.parentNode.insertBefore(a,m)
    })(window,document,'script','https://d2.restaurantassociation.com/mtc.js','mt');

    function log(m) {
        document.getElementById('log').innerHTML += `> ${m}<br>`;
    }

    function forceNewContactSync() {
        const email = document.getElementById('targetEmail').value;
        const tags = document.getElementById('targetTags').value;

        log(`Forcing sync for: ${email}`);

        // STEP 1: CLEAR THE TRACKING COOKIE
        // This stops Mautic from linking the hit to your previous contact ID
        mt('set', 'id', null); 

        // STEP 2: SET THE NEW IDENTITY
        mt('set', 'email', email);
        mt('set', 'tags', tags);

        // STEP 3: SEND THE DATA
        const article = "Labor Cost Trends 2025";
        const customUrl = `${window.location.origin}${window.location.pathname}?article=${encodeURIComponent(article)}&category=Content&action=Read&t=${Date.now()}`;

        mt('send', 'pageview', {
            'mt_event': article,
            'page_url': customUrl,
            'email': email,
            'tags': tags
        });

        log(`✅ Sent. Mautic now sees this as ${email}`);
    }
</script>

</body>
</html>
