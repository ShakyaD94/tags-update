<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mautic Manual Identity Sync</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #f0f4f8; }
        .control-panel { 
            background: white; padding: 30px; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; 
        }
        h2 { color: #004a7c; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .input-group { margin: 15px 0; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { 
            width: 100%; padding: 15px; background: #007cba; color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background: #005a87; }
        #terminal { 
            margin-top: 20px; background: #1a1a1a; color: #00ff00; padding: 15px; 
            border-radius: 6px; font-family: monospace; font-size: 12px; height: 100px; overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="control-panel">
    <h2>Manual Contact Sync</h2>
    
    <div class="input-group">
        <label>Step 1: Enter Target Email</label>
        <input type="email" id="targetEmail" placeholder="e.g. owner@bistro.com">
    </div>
    
    <div class="input-group">
        <label>Step 2: Enter Tags</label>
        <input type="text" id="targetTags" placeholder="e.g. hot_lead, pos_sales">
    </div>
    
    <button onclick="manualSync()">Send Data to Mautic</button>
    
    <div id="terminal">System: Awaiting manual trigger...</div>
</div>

<script>
    // --- 1. SILENT LOADER ---
    // We load the script but we DO NOT call mt('send', 'pageview') here.
    (function(w,d,t,u,n,a,m){
        w['MauticTrackingObject']=n;
        w[n]=w[n]||function(){(w[n].q=w[n].q||[]).push(arguments)},
        a=d.createElement(t),
        m=d.getElementsByTagName(t)[0];
        a.async=1; a.src=u; m.parentNode.insertBefore(a,m)
    })(window,document,'script','https://d2.restaurantassociation.com/mtc.js','mt');

    function log(msg) {
        const t = document.getElementById('terminal');
        t.innerHTML += `> ${msg}<br>`;
        t.scrollTop = t.scrollHeight;
    }

    // --- 2. THE TRIGGER-ONLY FUNCTION ---
    function manualSync() {
        const email = document.getElementById('targetEmail').value;
        const tags = document.getElementById('targetTags').value;

        if (!email) {
            alert("Error: You must provide an email ID.");
            return;
        }

        log(`Force Syncing: ${email}...`);

        // A. Clear the existing browser ID (Prevents merging with previous test)
        mt('set', 'id', null);

        // B. Set the new identity parameters
        mt('set', 'email', email);
        mt('set', 'tags', tags);

        // C. Build the forced URL for Timeline rows
        const article = "Labor Cost Trends 2025";
        const customUrl = `${window.location.origin}${window.location.pathname}?article=${encodeURIComponent(article)}&category=Content&action=Read&t=${Date.now()}`;

        // D. ONLY SEND NOW
        mt('send', 'pageview', {
            'mt_event': article,
            'page_url': customUrl,
            'email': email,
            'tags': tags
        });

        log(`✅ Event and identity sent for ${email}`);
    }

    // Server receipt confirmation
    document.addEventListener('mauticPageEventDelivered', function() {
        log('Mautic: Contact sync confirmed.');
    });
</script>

</body>
</html>
